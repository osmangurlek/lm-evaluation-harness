task: metu_pos_tag
dataset_path: metunlp/tr_pos
dataset_name: default
test_split: train
output_type: generate_until
doc_to_text: "Cümle: {{sentence}}\nTokens:"
doc_to_target: "{{tokens}}"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "Verilen bir cümlenin dilbilgisel analizini yapar, her kelimenin POS (Part-of-Speech) etiketini döndürür."
